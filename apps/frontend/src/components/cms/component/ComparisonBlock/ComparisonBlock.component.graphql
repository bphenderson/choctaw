fragment ComparisonBlockData on ComparisonBlock {
  comparisonTitle: ComparisonTitle
  products: Products {
    productName: ProductName
    productImage: ProductImage { ...ReferenceData }
    features: Features {                     # ⬅─ add braces …
      featureLabel: FeatureLabel             #    …and pick the sub-fields
      featureDescription: FeatureDescription { html }
    }
    cta: CTA { ...ButtonBlockPropertyData }
  }
}
