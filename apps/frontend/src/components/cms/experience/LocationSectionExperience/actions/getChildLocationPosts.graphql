query getChildLocationPosts(
  $parentKey: String!
  $locale: [Locales!]! = ALL
  $topic: String! = ""
  $limit: Int! = 9
  $skip: Int! = 0
) {
  result: _Page(
    where: { _metadata: { key: { eq: $parentKey } } }
    locale: $locale
  ) {
    items {
      container: _metadata {
        key
        displayName
      }
      items: _link(type: ITEMS) {
        posts: LocationPage(skip: $skip, limit: $limit) {
          total
          items {
            ...IContentData
            metadata: _metadata {
              key
              url {
                base
                default
              }
              published
            }
            heading: Heading
            subheading: ArticleSubHeading
            topic: Topic
            image: LocationPostPromoImage {
              src: url {
                base
                default
              }
            }
          }
          facets {
            topic: Topic(orderBy: ASC, filters: [$topic]) {
              name
              count
            }
            metadata: _metadata {
              published(unit: DAY) {
                name
                count
              }
            }
          }
        }
      }
    }
  }
}
