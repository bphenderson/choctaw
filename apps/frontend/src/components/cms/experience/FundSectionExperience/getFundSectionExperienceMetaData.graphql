query getFundSectionExperienceMetaData(
  $key: String!
  $version: String
  $locale: [Locales!]
) {
  page: FundSectionExperience(
    where: { _metadata: { key: { eq: $key }, version: { eq: $version } } }
    locale: $locale
  ) {
    items {
      _metadata {
        displayName
        published
        url {
          base
          default
        }
      }
      seo_data {
        ...PageSeoSettingsPropertyData
      }
    }
  }
}
