fragment HeroBlockData on HeroBlock {
  heroImage: HeroImage { ...ReferenceData }
  eyebrow: Eyebrow
  heroHeading: Heading
  heroSubheading: SubHeading
  heroDescription: Description { json, html }
  heroColor: HeroColor
  heroLayout: HeroLayout
  imagePosition: ImagePosition
  heroButton: HeroButton { ...ButtonBlockPropertyData }
  stats: Stats {
    ...IContentListItem
    ...BlockData
  }
}